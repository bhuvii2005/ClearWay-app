version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.4
    container_name: cleanroute-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: bhuvan#15
      POSTGRES_DB: cleanroute_db
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres-data:
        