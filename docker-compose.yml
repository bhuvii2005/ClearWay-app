version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.4
    container_name: cleanroute-db
    environment:
      POSTGRES_USER: cleanroute
      POSTGRES_PASSWORD: cleanroute_password
      POSTGRES_DB: cleanroute_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres-data:
        